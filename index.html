<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Writa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4a853">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #111111;
  --surface:   #1c1c1c;
  --surface2:  #232323;
  --surface3:  #2a2a2a;
  --border:    #2f2f2f;
  --border2:   #3a3a3a;
  --accent:    #d4a853;
  --text:      #e4e4e4;
  --text-dim:  #888;
  --text-muted:#555;
  --danger:    #e05555;
  --success:   #52a76a;
  --sidebar-w: 248px;
  --header-h:  48px;
  --toolbar-h: 46px;
  --status-h:  26px;
  --page-h: 1122px;
  --page-pad-y: 56px;
  --page-pad-x: 56px;
}

[data-theme="light"] {
  --bg:        #ece8df;
  --surface:   #fbf8f2;
  --surface2:  #f2ede2;
  --surface3:  #e8e1d3;
  --border:    #d7cfbe;
  --border2:   #c9bea7;
  --accent:    #b7832d;
  --text:      #2b2a28;
  --text-dim:  #5f5a4f;
  --text-muted:#8f8778;
  --danger:    #b54c4c;
  --success:   #3f8b56;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── HEADER ── */
.header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
  z-index: 50;
}

.menu-toggle {
  display: flex;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.menu-toggle:hover { background: var(--surface3); color: var(--text); }

.sidebar-collapsed .sidebar {
  transform: translateX(calc(-1 * var(--sidebar-w)));
}
.sidebar-collapsed .sidebar-overlay { display: none; }
.sidebar-collapsed .main { margin-left: 0; }

.logo {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.logo span { color: var(--accent); }

.doc-title-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
}
.doc-title {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 400;
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

.hbtn {
  height: 32px;
  padding: 0 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: all 0.15s;
}
.hbtn:hover { border-color: var(--border2); background: var(--surface3); color: var(--text); }
.hbtn.accent { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 600; }
.hbtn.accent:hover { background: #c89940; border-color: #c89940; }
.hbtn svg { flex-shrink: 0; }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
.import-btn { border-color: var(--accent); color: var(--accent); }
.import-btn:hover { border-color: var(--accent); }
#mobileNewBtn { display: none; }

/* ── BODY ── */
.app-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  z-index: 40;
}

.sidebar-top {
  padding: 12px 10px 8px;
  border-bottom: 1px solid var(--border);
}

.new-btn {
  width: 100%;
  height: 34px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: all 0.15s;
}
.new-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

.sidebar-label {
  padding: 12px 12px 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.doc-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 6px;
}

.doc-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  margin-bottom: 1px;
}
.doc-item:hover { background: var(--surface2); }
.doc-item.active { background: var(--surface3); }
.doc-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 2px; height: 55%;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.doc-icon {
  width: 26px; height: 26px;
  border-radius: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text-muted);
}
.doc-item.active .doc-icon { border-color: var(--border2); color: var(--text-dim); }

.doc-info { flex: 1; min-width: 0; }
.doc-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.doc-del {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 3px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  transition: all 0.12s;
  flex-shrink: 0;
}
.doc-item:hover .doc-del { opacity: 1; }
.doc-del:hover { background: rgba(224,85,85,0.15); color: var(--danger); }

.sidebar-stats {
  padding: 10px 10px;
  border-top: 1px solid var(--border);
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}
.stat-cell {
  background: var(--surface2);
  padding: 8px 6px;
  text-align: center;
}
.stat-val { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* ── OVERLAY (mobile) ── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 39;
}

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── TOOLBAR ── */
.toolbar {
  height: var(--toolbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 1px;
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: visible;
  flex-wrap: nowrap;
  white-space: nowrap;
}
.toolbar::-webkit-scrollbar { display: none; }
.toolbar > * { flex-shrink: 0; }

.tsep { width: 1px; height: 18px; background: var(--border2); margin: 0 4px; flex-shrink: 0; }

.tb {
  width: 34px; height: 34px;
  background: none;
  border: none;
  border-radius: 5px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.12s;
  position: relative;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
}
.tb svg { width: 16px; height: 16px; }
.tb:hover { background: var(--surface3); color: var(--text); }
.tb[data-tip]:hover::after,
.tb[data-tip]:focus::after,
.tb[data-tip]:active::after {
  content: attr(data-tip);
  position: absolute;
  bottom: -28px; left: 50%;
  transform: translateX(-50%);
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 11px;
  font-weight: 400;
  font-family: 'Inter', sans-serif;
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 200;
}
.tb.tip-show::after {
  content: attr(data-tip);
  position: absolute;
  bottom: -28px; left: 50%;
  transform: translateX(-50%);
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 11px;
  font-weight: 400;
  font-family: 'Inter', sans-serif;
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 200;
}
.tb:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.font-sel, .size-sel {
  height: 28px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  border-radius: 5px;
  padding: 0 6px;
  cursor: pointer;
  outline: none;
  flex-shrink: 0;
  transition: border-color 0.15s;
}
.font-sel { width: 114px; }
.size-sel { width: 52px; }
.font-sel:focus, .size-sel:focus { border-color: var(--accent); }

/* ── FIND BAR ── */
.find-bar {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.find-bar.open { display: flex; }
.find-in {
  height: 28px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 0 9px;
  border-radius: 5px;
  outline: none;
  width: 160px;
  transition: border-color 0.15s;
}
.find-in:focus { border-color: var(--accent); }
.find-count { font-size: 11px; color: var(--text-muted); min-width: 55px; }
.fbtn {
  height: 28px;
  padding: 0 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.12s;
}
.fbtn:hover { border-color: var(--border2); color: var(--text); }
.find-close-btn {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  border-radius: 4px;
  transition: color 0.12s;
}
.find-close-btn:hover { color: var(--text); }

/* ── EDITOR AREA ── */
.editor-wrap {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  padding: 32px 16px 48px;
}

.pages {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.page {
  width: 100%;
  min-height: var(--page-h);
  height: var(--page-h);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: var(--page-pad-y) var(--page-pad-x);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
}

.editor {
  width: 100%;
  height: calc(var(--page-h) - (var(--page-pad-y) * 2));
  background: none;
  border: none;
  overflow: hidden;
  outline: none;
  color: var(--text);
  font-family: 'Lora', serif;
  font-size: 16px;
  line-height: 1.85;
  caret-color: var(--accent);
  user-select: text;
}
.editor:empty::before {
  content: attr(data-ph);
  color: var(--text-muted);
  pointer-events: none;
}
.editor h1 { font-family: 'Lora', serif; font-size: 30px; font-weight: 600; line-height: 1.25; margin-bottom: 16px; color: var(--text); }
.editor h2 { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; line-height: 1.3; margin: 28px 0 10px; }
.editor h3 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; margin: 20px 0 8px; color: var(--text); }
.editor p  { margin-bottom: 12px; }
.editor blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 18px;
  color: var(--text-dim);
  margin: 18px 0;
  font-style: italic;
}
.editor ul, .editor ol { padding-left: 24px; margin-bottom: 12px; }
.editor li { margin-bottom: 4px; }
.editor a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.editor hr { border: none; border-top: 1px solid var(--border2); margin: 24px 0; }
.editor table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 14px; }
.editor th { background: var(--surface2); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.editor td, .editor th { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.editor .img-wrap {
  display: inline-block;
  max-width: 100%;
  resize: both;
  overflow: auto;
  border: 1px dashed transparent;
}
.editor .img-wrap:focus { outline: none; border-color: var(--accent); }
.editor .img-wrap img { display: block; width: 100%; height: auto; pointer-events: none; }

/* ── STATUS BAR ── */
.statusbar {
  height: var(--status-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 16px;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  overflow: hidden;
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
.status-dot.unsaved { background: var(--accent); }
.status-item { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.add-page-wrap {
  display: flex;
  justify-content: center;
  padding: 10px 0 18px;
}
.add-page-btn {
  height: 28px;
  padding: 0 14px;
  border-radius: 8px;
  border: 1px dashed var(--border2);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
}
.add-page-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(3px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 24px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
.modal-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; display: block; }
.modal-input {
  width: 100%;
  height: 38px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 0 12px;
  border-radius: 7px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--accent); }
.fmt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
.fmt-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 4px 8px;
  cursor: pointer;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.fmt-card:hover { border-color: var(--border2); background: var(--surface3); }
.fmt-card.sel { border-color: var(--accent); background: rgba(212,168,83,0.06); }
.fmt-card svg { color: var(--text-muted); }
.fmt-card.sel svg { color: var(--accent); }
.fmt-card .fl { font-size: 11px; font-weight: 600; color: var(--text-muted); }
.fmt-card.sel .fl { color: var(--accent); }
.modal-row { display: flex; gap: 8px; justify-content: flex-end; }
.mbtn {
  height: 34px;
  padding: 0 16px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.mbtn.ghost { background: none; color: var(--text-dim); }
.mbtn.ghost:hover { color: var(--text); }
.mbtn.solid { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 600; }
.mbtn.solid:hover { background: #c89940; }

/* ── EXPORT MENU ── */
.export-wrap { position: relative; }
.exp-menu {
  position: absolute;
  top: calc(100% + 5px);
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 9px;
  padding: 4px;
  min-width: 168px;
  box-shadow: 0 10px 36px rgba(0,0,0,0.45);
  z-index: 200;
  display: none;
}
.exp-menu.open { display: block; }
.exp-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.1s;
}
.exp-item:hover { background: var(--surface2); color: var(--text); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 40px; right: 18px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  padding: 8px 14px;
  border-radius: 7px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 7px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
  z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── SELECTION ── */
::selection { background: rgba(212,168,83,0.18); }

/* ═══════════════════════════
   RESPONSIVE
═══════════════════════════ */
@media (max-width: 768px) {
  :root { --header-h: 52px; }
  :root { --page-pad-y: 32px; --page-pad-x: 22px; }
  .header { padding: 0 8px; gap: 6px; }
  .logo { font-size: 12px; letter-spacing: 2px; flex-shrink: 0; }

  .menu-toggle { display: flex; }
  #mobileNewBtn { display: flex; }

  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: none;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }

  .doc-title { display: none; }
  .header-actions {
    margin-left: auto;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: calc(100vw - 120px);
    padding-bottom: 1px;
  }
  .header-actions::-webkit-scrollbar { display: none; }
  .icon-btn, .hbtn { width: 30px; height: 30px; }

  .hbtn span { display: none; }
  .hbtn { padding: 0; justify-content: center; }
  .hbtn svg { flex-shrink: 0; }

  .sidebar-top .new-btn { width: 100%; justify-content: center; }
  .add-page-wrap { padding: 8px 0 16px; }
  .add-page-btn { width: min(320px, 92%); }

  .editor { font-size: 15px; }

  .find-bar { gap: 5px; padding: 6px 8px; }
  .find-in { width: auto; min-width: 0; flex: 1 1 120px; }
  #replIn { width: auto !important; }

  .toolbar { padding: 0 4px; }
  .tb { width: 36px; height: 36px; }
  .tb svg { width: 17px; height: 17px; }

  .doc-title-wrap { flex: 0; }

  .statusbar {
    gap: 10px;
    height: auto;
    min-height: var(--status-h);
    padding: 4px 10px;
    overflow-x: auto;
    white-space: nowrap;
  }
  .statusbar::-webkit-scrollbar { display: none; }
  .statusbar .hide-mobile { display: none; }
}

@media (max-width: 480px) {
  :root { --page-pad-y: 24px; --page-pad-x: 14px; }
  .header { padding: 0 6px; }
  .logo { font-size: 11px; letter-spacing: 1.6px; }
  .header-actions { max-width: calc(100vw - 96px); }
  .editor-wrap { padding: 16px 8px 40px; }
  .editor { font-size: 15px; line-height: 1.75; }
  .sidebar-top .new-btn { font-size: 12px; }
  .add-page-btn { width: min(280px, 92%); }
  .find-bar { gap: 4px; }
  .find-in { flex: 1 1 100px; }
  #replIn { flex-basis: 96px; }
  .fbtn { padding: 0 8px; }
  .statusbar #clock { display: none; }
  .logo span { font-size: 11px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <div class="logo">WR<span>I</span>TA</div>

  <div class="doc-title-wrap">
    <div class="doc-title" id="docTitle">Untitled</div>
  </div>

  <div class="header-actions">
    <button class="icon-btn" onclick="openModal()" title="New Document" id="mobileNewBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleFind()" title="Find & Replace">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="icon-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="hbtn" id="installBtn" onclick="installApp()" style="display:none" title="Install App">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Install</span>
    </button>

    <div class="export-wrap">
      <button class="hbtn" id="expBtn" onclick="toggleExport()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export</span>
      </button>
      <div class="exp-menu" id="expMenu">
        <div class="exp-item" onclick="exportAs('txt')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Plain Text
        </div>
        <div class="exp-item" onclick="exportAs('md')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="M7 16V8l3 4 3-4v8"/><path d="M17 8v8"/><path d="M15 12h4"/></svg>
          Markdown (.md)
        </div>
        <div class="exp-item" onclick="exportAs('html')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          HTML
        </div>
        <div class="exp-item" onclick="exportAs('docx')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Word (.docx)
        </div>
        <div class="exp-item" onclick="exportAs('pdf')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13h3a2 2 0 0 0 0-4H9v8"/></svg>
          PDF
        </div>
      </div>
    </div>

    <button class="hbtn accent" onclick="saveDoc()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span>Save</span>
    </button>
  </div>
  <input id="fileImportInput" type="file" accept=".txt,.md,.csv,.json,.log,.docx" multiple style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
  <input id="imageImportInput" type="file" accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
</header>

<!-- BODY -->
<div class="app-body">

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="new-btn" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Document
      </button>
      <button class="new-btn" onclick="openImportPicker()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Import File
      </button>
    </div>
    <div class="sidebar-label">Documents</div>
    <div class="doc-list" id="docList"></div>
    <div class="sidebar-stats">
      <div class="stat-grid">
        <div class="stat-cell"><div class="stat-val" id="sb-w">0</div><div class="stat-lbl">Words</div></div>
        <div class="stat-cell"><div class="stat-val" id="sb-c">0</div><div class="stat-lbl">Chars</div></div>
        <div class="stat-cell"><div class="stat-val" id="sb-p">1</div><div class="stat-lbl">Pages</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOOLBAR -->
    <div class="toolbar" id="toolbar">
      <select class="font-sel" id="fontSel" onchange="applyFont()">
        <option value="'Lora',serif">Lora</option>
        <option value="'Inter',sans-serif">Inter</option>
        <option value="'JetBrains Mono',monospace">Mono</option>
        <option value="Georgia,serif">Georgia</option>
        <option value="'Times New Roman',serif">Times</option>
        <option value="Arial,sans-serif">Arial</option>
        <option value="Verdana,sans-serif">Verdana</option>
      </select>
      <select class="size-sel" id="sizeSel" onchange="applySize()">
        <option>10</option><option>12</option><option>13</option>
        <option selected>16</option><option>18</option><option>20</option>
        <option>24</option><option>28</option><option>32</option>
        <option>36</option><option>48</option>
      </select>
      <div class="tsep"></div>
      <button class="tb" data-tip="Bold" onclick="fmt('bold')"><b>B</b></button>
      <button class="tb" data-tip="Italic" onclick="fmt('italic')"><i style="font-style:italic">I</i></button>
      <button class="tb" data-tip="Underline" onclick="fmt('underline')"><u>U</u></button>
      <button class="tb" data-tip="Strikethrough" onclick="fmt('strikeThrough')" style="font-size:13px"><s>S</s></button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Heading 1" onclick="fmtBlock('h1')" style="font-size:11px;font-weight:700">H1</button>
      <button class="tb" data-tip="Heading 2" onclick="fmtBlock('h2')" style="font-size:11px;font-weight:700">H2</button>
      <button class="tb" data-tip="Heading 3" onclick="fmtBlock('h3')" style="font-size:11px;font-weight:700">H3</button>
      <button class="tb" data-tip="Paragraph" onclick="fmtBlock('p')" style="font-size:12px">P</button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Insert Image" onclick="openImagePicker()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5-4 4-3-3-5 5"/></svg>
      </button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Align Left" onclick="fmt('justifyLeft')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
      </button>
      <button class="tb" data-tip="Center" onclick="fmt('justifyCenter')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <button class="tb" data-tip="Align Right" onclick="fmt('justifyRight')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Bullet List" onclick="fmt('insertUnorderedList')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="tb" data-tip="Numbered List" onclick="fmt('insertOrderedList')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="1.5" y="8.5" font-size="6.5" fill="currentColor" stroke="none" font-family="monospace">1.</text><text x="1.5" y="14.5" font-size="6.5" fill="currentColor" stroke="none" font-family="monospace">2.</text><text x="1.5" y="20.5" font-size="6.5" fill="currentColor" stroke="none" font-family="monospace">3.</text></svg>
      </button>
      <button class="tb" data-tip="Blockquote" onclick="fmtBlock('blockquote')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
      </button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Link" onclick="insertLink()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
      <button class="tb" data-tip="Table" onclick="insertTable()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
      </button>
      <button class="tb" data-tip="Divider" onclick="fmt('insertHorizontalRule')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/></svg>
      </button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Text Color" onclick="document.getElementById('tci').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="m6 16 6-12 6 12"/><path d="M8 12h8"/></svg>
        <input type="color" id="tci" style="display:none" onchange="fmt('foreColor',this.value)">
      </button>
      <button class="tb" data-tip="Highlight" onclick="document.getElementById('hci').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
        <input type="color" id="hci" value="#d4a853" style="display:none" onchange="fmt('hiliteColor',this.value)">
      </button>
      <div class="tsep"></div>
      <button class="tb" data-tip="Undo" onclick="fmt('undo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button class="tb" data-tip="Redo" onclick="fmt('redo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
      </button>
      <button class="tb" data-tip="Clear Formatting" onclick="fmt('removeFormat')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M5 20h6"/><path d="M13 4 8 20"/><line x1="17" y1="14" x2="22" y2="19"/><line x1="22" y1="14" x2="17" y2="19"/></svg>
      </button>
    </div>

    <!-- FIND BAR -->
    <div class="find-bar" id="findBar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="find-in" id="findIn" placeholder="Find…" oninput="doFind()">
      <input class="find-in" id="replIn" placeholder="Replace…" style="width:130px">
      <span class="find-count" id="findCount"></span>
      <button class="fbtn" onclick="doReplace()">Replace</button>
      <button class="fbtn" onclick="doReplaceAll()">All</button>
      <button class="find-close-btn" onclick="toggleFind()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- EDITOR -->
    <div class="editor-wrap">
      <div class="pages" id="pages">
        <div class="page">
          <div
            class="editor"
            contenteditable="true"
            data-ph=""
            spellcheck="true"
          ></div>
        </div>
      </div>
      <div class="add-page-wrap">
        <button class="add-page-btn" onclick="addPage()" type="button">Add Page</button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="statusbar">
      <div class="status-item">
        <div class="status-dot" id="dot"></div>
        <span id="statusTxt">Saved</span>
      </div>
      <span class="hide-mobile"><span id="sw">0</span> words</span>
      <span class="hide-mobile"><span id="sc">0</span> chars</span>
      <span>Page <span id="sp">1</span></span>
      <span id="clock"></span>
    </div>
  </main>
</div>

<!-- NEW DOC MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">New Document</div>
    <div class="modal-sub">Name your document and pick a format.</div>
    <label class="modal-label">Name</label>
    <input class="modal-input" id="newName"
      onkeydown="if(event.key==='Enter')createDoc();if(event.key==='Escape')closeModal()">
    <label class="modal-label">Format</label>
    <div class="fmt-grid">
      <div class="fmt-card sel" data-fmt="docx" onclick="pickFmt(this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <div class="fl">DOCX</div>
      </div>
      <div class="fmt-card" data-fmt="doc" onclick="pickFmt(this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div class="fl">DOC</div>
      </div>
      <div class="fmt-card" data-fmt="pdf" onclick="pickFmt(this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13h3a2 2 0 0 0 0-4H9v8"/></svg>
        <div class="fl">PDF</div>
      </div>
      <div class="fmt-card" data-fmt="txt" onclick="pickFmt(this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
        <div class="fl">TXT</div>
      </div>
    </div>
    <div class="modal-row">
      <button class="mbtn ghost" onclick="closeModal()">Cancel</button>
      <button class="mbtn solid" onclick="createDoc()">Create</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-docx-js/0.3.1/html-docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
// ── SVGs ──
const ICON_FILE = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
const ICON_TRASH = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`;
const ICON_SUN = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>`;
const ICON_MOON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>`;

// ── STATE ──
let docs = JSON.parse(localStorage.getItem('writa_v3') || '[]');
let activeId = null;
let unsaved  = false;
let fmtVal   = 'docx';
let activeEditor = null;

const PAGE_BREAK = '<!--WRITA_PAGE_BREAK-->';
const THEME_KEY = 'writa_theme_v1';

let deferredInstallPrompt = null;
let isInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
if (!docs.length) {
  const d = { id: uid(), name: 'Untitled Document', fmt: 'docx', content: '', updated: Date.now() };
  docs = [d];
  persist();
}

const fileImportInput = document.getElementById('fileImportInput');
if (fileImportInput) fileImportInput.addEventListener('change', importFiles);
const imageImportInput = document.getElementById('imageImportInput');
if (imageImportInput) imageImportInput.addEventListener('change', importImageFile);
document.querySelectorAll('.tb[data-tip]').forEach(btn => {
  if (!btn.hasAttribute('title')) btn.setAttribute('title', btn.getAttribute('data-tip'));
});
applyTheme(loadTheme());
if (window.innerWidth > 768) {
  document.body.classList.add('sidebar-collapsed');
}
loadDoc(docs[0].id);
renderList();
tick();
setInterval(tick, 30000);
setInterval(() => { if (unsaved) saveDoc(); }, 5000);

// ── CORE ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function persist() { localStorage.setItem('writa_v3', JSON.stringify(docs)); }

function renderList() {
  document.getElementById('docList').innerHTML = docs.map(d => `
    <div class="doc-item${d.id===activeId?' active':''}" onclick="switchDoc('${d.id}')">
      <div class="doc-icon">${ICON_FILE}</div>
      <div class="doc-info">
        <div class="doc-name">${esc(d.name)}</div>
        <div class="doc-meta">${d.fmt.toUpperCase()} · ${relTime(d.updated)}</div>
      </div>
      <button class="doc-del" onclick="event.stopPropagation();delDoc('${d.id}')" title="Delete">${ICON_TRASH}</button>
    </div>
  `).join('');
}

function switchDoc(id) {
  if (activeId) {
    const d = docs.find(x=>x.id===activeId);
    if (d) d.content = getDocContent();
    persist();
  }
  closeSidebar();
  loadDoc(id);
}

function loadDoc(id) {
  activeId = id;
  const d = docs.find(x=>x.id===id);
  if (!d) return;
  setDocContent(d.content || '');
  document.getElementById('docTitle').textContent = d.name;
  unsaved = false;
  setStatus(false);
  counts();
  focusActiveEditor();
  renderList();
}

function saveDoc() {
  const d = docs.find(x=>x.id===activeId);
  if (!d) return;
  d.content = getDocContent();
  d.updated  = Date.now();
  persist();
  unsaved = false;
  setStatus(false);
  renderList();
  showToast('Saved');
}

function delDoc(id) {
  if (docs.length === 1) { showToast('Cannot delete last document'); return; }
  docs = docs.filter(d=>d.id!==id);
  persist();
  if (activeId === id) loadDoc(docs[0].id);
  else renderList();
}

// ── SIDEBAR MOBILE ──
function toggleSidebar() {
  if (window.matchMedia('(max-width: 768px)').matches) {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebarOverlay');
    const open = s.classList.toggle('open');
    open ? o.classList.add('open') : o.classList.remove('open');
    return;
  }
  document.body.classList.toggle('sidebar-collapsed');
}
function closeSidebar() {
  if (window.matchMedia('(max-width: 768px)').matches) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
    return;
  }
  document.body.classList.add('sidebar-collapsed');
}

// ── MODAL ──
function openModal() {
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('newName').focus(),60);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function pickFmt(el) {
  document.querySelectorAll('.fmt-card').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  fmtVal = el.dataset.fmt;
}
function createDoc() {
  const name = document.getElementById('newName').value.trim() || 'Untitled Document';
  const d = { id: uid(), name, fmt: fmtVal, content: '', updated: Date.now() };
  docs.unshift(d);
  persist();
  closeModal();
  loadDoc(d.id);
  showToast(`"${name}" created`);
}

function openImportPicker() {
  const input = document.getElementById('fileImportInput');
  if (input) input.click();
}
function openImagePicker() {
  const input = document.getElementById('imageImportInput');
  if (input) input.click();
}

function importFiles(event) {
  const files = Array.from(event.target.files || []);
  if (!files.length) return;
  files.forEach(importFile);
  event.target.value = '';
}
function importImageFile(event) {
  const file = (event.target.files || [])[0];
  if (!file) return;
  if (!/^image\//i.test(file.type)) {
    showToast('Not an image file');
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    focusActiveEditor();
    const html = `<span class="img-wrap" contenteditable="false"><img src="${reader.result}" alt=""></span><span>\u200b</span>`;
    document.execCommand('insertHTML', false, html);
    reflowAll();
    counts();
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function importFile(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (['txt', 'md', 'csv', 'json', 'log'].includes(ext)) {
    const reader = new FileReader();
    reader.onload = () => createImportedDoc(stripExt(file.name), 'docx', textToHtml(reader.result || ''));
    reader.readAsText(file);
    return;
  }

  if (ext === 'docx') {
    importDocxAsEditable(file);
    return;
  }

  createImportedDoc(stripExt(file.name), ext || 'doc', '');
}

function importDocxAsEditable(file, arrayBuffer) {
  if (!window.mammoth || !mammoth.convertToHtml) {
    const url = URL.createObjectURL(file);
    const hint = `<p><strong>${esc(file.name)}</strong> couldn't be converted because the DOCX converter failed to load.</p>
      <p><a href="${url}" target="_blank" rel="noopener">Open file</a> or <a href="${url}" download="${esc(file.name)}">download</a>.</p>`;
    createImportedDoc(stripExt(file.name), 'docx', hint);
    return;
  }
  const convert = async (buffer) => {
    try {
      const result = await mammoth.convertToHtml(
        { arrayBuffer: buffer },
        {
          convertImage: mammoth.images.inline((image) =>
            image.read('base64').then((data) => ({
              src: `data:${image.contentType};base64,${data}`
            }))
          )
        }
      );
      const html = result && result.value ? result.value : '';
      createImportedDoc(stripExt(file.name), 'docx', html || '');
      showToast('DOCX converted');
    } catch (err) {
      const url = URL.createObjectURL(file);
      const hint = `<p><strong>${esc(file.name)}</strong> couldn't be converted.</p>
        <p><a href="${url}" target="_blank" rel="noopener">Open file</a> or <a href="${url}" download="${esc(file.name)}">download</a>.</p>`;
      createImportedDoc(stripExt(file.name), 'docx', hint);
      showToast('DOCX conversion failed');
    }
  };

  if (arrayBuffer) {
    showToast('Converting DOCX...');
    convert(arrayBuffer);
    return;
  }

  showToast('Converting DOCX...');
  const reader = new FileReader();
  reader.onload = () => convert(reader.result);
  reader.readAsArrayBuffer(file);
}


function createImportedDoc(name, fmt, content) {
  const d = { id: uid(), name: name || 'Imported Document', fmt: fmt || 'docx', content, updated: Date.now() };
  docs.unshift(d);
  persist();
  loadDoc(d.id);
  renderList();
  showToast(`Imported "${d.name}"`);
}

function stripExt(name) {
  return name.replace(/\.[^.]+$/, '');
}



function textToHtml(text) {
  const normalized = String(text || '').replace(/\r\n?/g, '\n');
  if (!normalized.trim()) return '';
  return normalized.split('\n').map(line => line ? `<p>${esc(line)}</p>` : '<p><br></p>').join('');
}

// ── EDITOR ──
function fmt(cmd, val=null) {
  focusActiveEditor();
  document.execCommand(cmd, false, val);
  reflowAll();
  counts();
}
document.addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('.tb[data-tip]');
  if (!btn) return;
  if (btn._tipTimer) clearTimeout(btn._tipTimer);
  btn.classList.add('tip-show');
  btn._tipTimer = setTimeout(() => btn.classList.remove('tip-show'), 1200);
});
function fmtBlock(tag) {
  focusActiveEditor();
  document.execCommand('formatBlock', false, tag);
  reflowAll();
  counts();
}
function applyFont() { fmt('fontName', document.getElementById('fontSel').value); }
function applySize() {
  focusActiveEditor();
  const sz = document.getElementById('sizeSel').value;
  document.execCommand('fontSize', false, 7);
  getEditors().forEach(ed => {
    ed.querySelectorAll('font[size="7"]').forEach(f => {
      f.removeAttribute('size'); f.style.fontSize = sz + 'px';
    });
  });
  reflowAll();
}
function insertLink() {
  const url = prompt('Enter URL:', 'https://');
  if (url) fmt('createLink', url);
}
function insertTable() {
  const r = parseInt(prompt('Rows:', '3'))||3;
  const c = parseInt(prompt('Columns:', '3'))||3;
  let html = '<table style="border-collapse:collapse;width:100%;margin:14px 0;font-size:14px">';
  for (let i=0;i<r;i++) {
    html += '<tr>';
    for (let j=0;j<c;j++) {
      if (i===0) html += `<th style="border:1px solid var(--border);padding:8px 12px;background:var(--surface2);font-family:Inter,sans-serif;font-size:12px;font-weight:600;text-align:left">Header ${j+1}</th>`;
      else html += `<td style="border:1px solid var(--border);padding:8px 12px">Cell</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  fmt('insertHTML', html);
}

function onInput(event) {
  unsaved = true;
  setStatus(true);
  reflowFrom(event.target);
  counts();
}

function onKey(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveDoc(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='f') { e.preventDefault(); toggleFind(); }
  if (e.key==='Tab') { e.preventDefault(); fmt('insertText','    '); }
}

function getEditors() {
  return Array.from(document.querySelectorAll('#pages .editor'));
}

function createPage(content='') {
  const page = document.createElement('div');
  page.className = 'page';
  const editor = document.createElement('div');
  editor.className = 'editor';
  editor.contentEditable = 'true';
  editor.dataset.ph = '';
  editor.spellcheck = true;
  editor.innerHTML = content;
  editor.addEventListener('input', onInput);
  editor.addEventListener('keydown', onKey);
  editor.addEventListener('focus', () => {
    activeEditor = editor;
    updatePageIndicator();
  });
  page.appendChild(editor);
  return page;
}

function setDocContent(content) {
  const container = document.getElementById('pages');
  container.innerHTML = '';
  const parts = String(content || '').includes(PAGE_BREAK)
    ? String(content || '').split(PAGE_BREAK)
    : [String(content || '')];
  if (!parts.length) parts.push('');
  parts.forEach(part => container.appendChild(createPage(part)));
  activeEditor = getEditors()[0] || null;
  reflowAll();
}

function getDocContent() {
  trimTrailingPages();
  return getEditors().map(ed => ed.innerHTML).join(PAGE_BREAK);
}

function focusActiveEditor() {
  if (!activeEditor || !document.body.contains(activeEditor)) {
    activeEditor = getEditors()[0] || null;
  }
  if (activeEditor) activeEditor.focus();
}

function appendPage() {
  const pages = document.getElementById('pages');
  const node = createPage('');
  pages.appendChild(node);
  return node.querySelector('.editor');
}
function addPage() {
  const ed = appendPage();
  setTimeout(() => {
    if (ed) {
      ed.focus();
      ed.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 0);
  counts();
}

function isOverflowing(editor) {
  return editor.scrollHeight > editor.clientHeight + 1;
}

function reflowFrom(editor) {
  const editors = getEditors();
  let index = Math.max(0, editors.indexOf(editor));
  if (index < 0) index = 0;
  for (let i=index; i<getEditors().length; i++) {
    balancePage(i);
  }
  trimTrailingPages();
  updatePageIndicator();
}

function reflowAll() {
  const editors = getEditors();
  for (let i=0; i<editors.length; i++) balancePage(i);
  trimTrailingPages();
  updatePageIndicator();
}

function balancePage(index) {
  const editors = getEditors();
  const current = editors[index];
  if (!current) return;

  let guard = 0;
  while (isOverflowing(current) && current.childNodes.length > 1 && guard < 500) {
    const node = current.lastChild;
    let next = getEditors()[index + 1];
    if (!next) next = appendPage();
    next.insertBefore(node, next.firstChild);
    guard++;
  }

  guard = 0;
  let next = getEditors()[index + 1];
  while (next && next.firstChild && guard < 500) {
    const node = next.firstChild;
    current.appendChild(node);
    if (isOverflowing(current)) {
      next.insertBefore(node, next.firstChild);
      break;
    }
    guard++;
    next = getEditors()[index + 1];
  }
}

function isHtmlEmpty(html) {
  return String(html || '')
    .replace(/<br\s*\/?>/gi, '')
    .replace(/&nbsp;/gi, '')
    .replace(/<div>\s*<\/div>/gi, '')
    .trim() === '';
}

function trimTrailingPages() {
  const pages = Array.from(document.querySelectorAll('#pages .page'));
  for (let i=pages.length - 1; i>0; i--) {
    const ed = pages[i].querySelector('.editor');
    if (!isHtmlEmpty(ed.innerHTML)) break;
    if (activeEditor === ed) {
      activeEditor = pages[i - 1].querySelector('.editor');
    }
    pages[i].remove();
  }
  if (!getEditors().length) {
    document.getElementById('pages').appendChild(createPage(''));
    activeEditor = getEditors()[0] || null;
  }
}

function updatePageIndicator() {
  const editors = getEditors();
  const total = editors.length || 1;
  const idx = Math.max(0, editors.indexOf(activeEditor)) + 1;
  document.getElementById('sp').textContent = total > 1 ? `${idx}/${total}` : '1';
}

function getAllText() {
  return getEditors().map(ed => ed.innerText || '').join('\n');
}

function getAllHtml() {
  return getEditors().map(ed => ed.innerHTML).join('');
}

function setStatus(dirty) {
  document.getElementById('dot').className = 'status-dot' + (dirty ? ' unsaved' : '');
  document.getElementById('statusTxt').textContent = dirty ? 'Unsaved' : 'Saved';
}

function counts() {
  const t = getAllText();
  const w = t.trim() ? t.trim().split(/\s+/).length : 0;
  const c = t.length;
  document.getElementById('sw').textContent  = w;
  document.getElementById('sc').textContent  = c;
  const pages = getEditors().length || 1;
  document.getElementById('sb-w').textContent = w;
  document.getElementById('sb-c').textContent = c;
  document.getElementById('sb-p').textContent = pages;
  updatePageIndicator();
}

// ── FIND ──
function toggleFind() {
  const fb = document.getElementById('findBar');
  fb.classList.toggle('open');
  if (fb.classList.contains('open')) document.getElementById('findIn').focus();
  else clearMarks();
}
function doFind() {
  clearMarks();
  const term = document.getElementById('findIn').value;
  if (!term) { document.getElementById('findCount').textContent=''; return; }
  let n = 0;
  getEditors().forEach(ed => {
    ed.innerHTML = ed.innerHTML.replace(/>[^<]*/g, m =>
      m.replace(new RegExp(escRe(term),'gi'), s => { n++; return `<mark style="background:rgba(212,168,83,0.25);border-radius:2px">${s}</mark>`; })
    );
  });
  document.getElementById('findCount').textContent = n ? `${n} found` : 'Not found';
}
function clearMarks() {
  getEditors().forEach(ed => {
    ed.innerHTML = ed.innerHTML.replace(/<mark[^>]*>(.*?)<\/mark>/gi,'$1');
  });
}
function doReplace() {
  const f=document.getElementById('findIn').value, r=document.getElementById('replIn').value;
  if (!f) return;
  clearMarks();
  const re = new RegExp(escRe(f), 'i');
  for (const ed of getEditors()) {
    if (re.test(ed.innerHTML)) {
      ed.innerHTML = ed.innerHTML.replace(re, r);
      break;
    }
  }
  reflowAll();
  counts();
  doFind();
}
function doReplaceAll() {
  const f=document.getElementById('findIn').value, r=document.getElementById('replIn').value;
  if (!f) return;
  clearMarks();
  const re = new RegExp(escRe(f), 'gi');
  let n = 0;
  getEditors().forEach(ed => {
    n += (ed.innerHTML.match(re) || []).length;
    ed.innerHTML = ed.innerHTML.replace(re, r);
  });
  reflowAll();
  counts();
  showToast(`Replaced ${n} instance${n===1?'':'s'}`);
}

// ── EXPORT ──
function toggleExport() { document.getElementById('expMenu').classList.toggle('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.export-wrap')) document.getElementById('expMenu').classList.remove('open');
});
function exportAs(type) {
  document.getElementById('expMenu').classList.remove('open');
  const d = docs.find(x=>x.id===activeId);
  if (!d) return;
  const html = getAllHtml();
  const text = getAllText();
  if (type==='txt') {
    dl(d.name+'.txt', text, 'text/plain');
  } else if (type==='md') {
    dl(d.name+'.md', htmlToMarkdown(html), 'text/markdown');
  } else if (type==='html') {
    const page = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${d.name}</title><style>body{font-family:Georgia,serif;max-width:720px;margin:48px auto;padding:0 24px;line-height:1.8;color:#222;font-size:16px}h1{font-size:32px;margin-bottom:16px}h2{font-size:24px;margin:28px 0 12px}h3{font-size:18px;margin:20px 0 8px}blockquote{border-left:2px solid #d4a853;padding-left:18px;color:#666;font-style:italic;margin:18px 0}table{border-collapse:collapse;width:100%;margin:14px 0}td,th{border:1px solid #ddd;padding:8px 12px}th{background:#f5f5f5;font-weight:600}</style></head><body>${html}</body></html>`;
    dl(d.name+'.html', page, 'text/html');
  } else if (type==='docx') {
    exportDocx(html, d.name);
    return;
  } else if (type==='pdf') {
    printPdf(html, d.name);
    return;
  }
  showToast(`Exported as ${type.toUpperCase()}`);
}
function printPdf(html, title) {
  const frame = document.createElement('iframe');
  frame.style.position = 'fixed';
  frame.style.right = '0';
  frame.style.bottom = '0';
  frame.style.width = '0';
  frame.style.height = '0';
  frame.style.border = '0';
  frame.style.opacity = '0';
  frame.setAttribute('aria-hidden', 'true');
  document.body.appendChild(frame);

  const doc = frame.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>@page{margin:2.2cm}body{font-family:Georgia,serif;line-height:1.8;color:#111;font-size:12pt}h1{font-size:26pt;margin-bottom:14px}h2{font-size:18pt;margin:24px 0 10px}h3{font-size:13pt;margin:18pt 0 8pt}blockquote{border-left:2px solid #aaa;padding-left:16px;color:#555;font-style:italic;margin:16px 0}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:7px 11px}th{background:#f0f0f0}</style></head><body>${html}</body></html>`);
  doc.close();

  setTimeout(() => {
    frame.contentWindow.focus();
    frame.contentWindow.print();
    setTimeout(() => frame.remove(), 1500);
  }, 120);
  showToast('Print dialog opened');
}
function exportDocx(html, title) {
  if (!window.htmlDocx || !window.saveAs) {
    showToast('DOCX export unavailable');
    return;
  }
  const page = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>body{font-family:Calibri,sans-serif;line-height:1.6;font-size:11pt}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:6px 10px}</style></head><body>${html}</body></html>`;
  const blob = window.htmlDocx.asBlob(page);
  window.saveAs(blob, `${title}.docx`);
  showToast('Exported as DOCX');
}
function htmlToMarkdown(html) {
  const wrap = document.createElement('div');
  wrap.innerHTML = html || '';

  function nodeToMd(node, depth = 0) {
    if (node.nodeType === Node.TEXT_NODE) return node.textContent || '';
    if (node.nodeType !== Node.ELEMENT_NODE) return '';
    const tag = node.tagName.toLowerCase();
    const children = () => Array.from(node.childNodes).map(n => nodeToMd(n, depth)).join('');

    if (tag === 'br') return '\n';
    if (tag === 'hr') return '\n---\n\n';
    if (tag === 'strong' || tag === 'b') return `**${children()}**`;
    if (tag === 'em' || tag === 'i') return `*${children()}*`;
    if (tag === 'u') return `<u>${children()}</u>`;
    if (tag === 's' || tag === 'strike') return `~~${children()}~~`;
    if (tag === 'code') return `\`${children().replace(/\n/g, ' ')}\``;
    if (tag === 'a') return `[${children().trim() || (node.getAttribute('href') || '')}](${node.getAttribute('href') || ''})`;
    if (tag === 'h1') return `# ${children().trim()}\n\n`;
    if (tag === 'h2') return `## ${children().trim()}\n\n`;
    if (tag === 'h3') return `### ${children().trim()}\n\n`;
    if (tag === 'blockquote') {
      const q = children().trim().split('\n').map(line => `> ${line}`).join('\n');
      return `${q}\n\n`;
    }
    if (tag === 'li') {
      const parentTag = node.parentElement ? node.parentElement.tagName.toLowerCase() : 'ul';
      const prefix = parentTag === 'ol' ? '1. ' : '- ';
      return `${'  '.repeat(depth)}${prefix}${children().trim()}\n`;
    }
    if (tag === 'ul' || tag === 'ol') {
      return `${Array.from(node.children).map(li => nodeToMd(li, depth + 1)).join('')}\n`;
    }
    if (tag === 'p' || tag === 'div') return `${children().trim()}\n\n`;
    if (tag === 'table') return `${tableToMd(node)}\n`;
    return children();
  }

  function tableToMd(table) {
    const rows = Array.from(table.querySelectorAll('tr')).map(tr =>
      Array.from(tr.children).map(c => (c.textContent || '').trim().replace(/\|/g, '\\|'))
    );
    if (!rows.length) return '';
    const head = rows[0];
    const body = rows.slice(1);
    const header = `| ${head.join(' | ')} |`;
    const sep = `| ${head.map(() => '---').join(' | ')} |`;
    const lines = body.map(r => `| ${r.join(' | ')} |`);
    return [header, sep, ...lines].join('\n');
  }

  return Array.from(wrap.childNodes).map(n => nodeToMd(n)).join('')
    .replace(/\n{3,}/g, '\n\n')
    .trim() + '\n';
}
function dl(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name;
  a.click();
}

// ── THEME ──
function loadTheme() {
  return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  const btn = document.getElementById('themeToggleBtn');
  if (btn) {
    btn.innerHTML = theme === 'light' ? ICON_MOON : ICON_SUN;
    btn.title = theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
    btn.setAttribute('aria-label', btn.title);
  }
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'light' ? '#ece8df' : '#d4a853');
}
function toggleTheme() {
  applyTheme(loadTheme() === 'light' ? 'dark' : 'light');
}

// ── UTILS ──
function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2600);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function relTime(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return 'now';
  if (s<3600) return Math.floor(s/60)+'m ago';
  if (s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function updateInstallButton() {
  const btn = document.getElementById('installBtn');
  if (!btn) return;
  btn.style.display = (deferredInstallPrompt && !isInstalled) ? 'flex' : 'none';
}

async function installApp() {
  if (!deferredInstallPrompt) {
    showToast('Install option not ready yet');
    return;
  }

  deferredInstallPrompt.prompt();
  const choice = await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  updateInstallButton();

  if (choice && choice.outcome === 'accepted') {
    showToast('Installing app...');
  }
}

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredInstallPrompt = event;
  updateInstallButton();
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  isInstalled = true;
  updateInstallButton();
  showToast('App installed');
});
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
counts();
updateInstallButton();
</script>

      .catch((err) => {
